<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="cl">
      <rect x="0" y="0" width="32" height="64"/>
    </clipPath>
    <clipPath id="cr">
      <rect x="32" y="0" width="32" height="64"/>
    </clipPath>
  </defs>

  <!-- AI side background (left, dark teal) -->
  <circle cx="32" cy="32" r="29" clip-path="url(#cl)" fill="#12303e"/>
  <!-- Human side background (right, warm skin) -->
  <circle cx="32" cy="32" r="29" clip-path="url(#cr)" fill="#f0d0a0"/>

  <!-- AI side: square eye -->
  <rect x="11" y="21" width="12" height="9" rx="1.5" clip-path="url(#cl)" fill="#0f7b68"/>
  <rect x="14" y="24" width="6" height="3" rx="0.5" clip-path="url(#cl)" fill="#6ef0d0"/>
  <!-- AI side: circuit lines under eye -->
  <polyline points="17,30 17,34 8,34" clip-path="url(#cl)" fill="none" stroke="#0f7b68" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="8" cy="34" r="1.3" clip-path="url(#cl)" fill="#0f7b68"/>
  <!-- AI side: straight mouth -->
  <rect x="8" y="41" width="18" height="2.5" rx="1.2" clip-path="url(#cl)" fill="#0f7b68"/>

  <!-- Human side: round eye -->
  <ellipse cx="44" cy="25" rx="5.5" ry="4.5" clip-path="url(#cr)" fill="#fff"/>
  <circle cx="44" cy="25" r="2.8" clip-path="url(#cr)" fill="#4a2800"/>
  <circle cx="45.2" cy="23.8" r="1" clip-path="url(#cr)" fill="#fff"/>
  <!-- Human side: eyebrow -->
  <path d="M38.5 19.5 Q44 17.5 49.5 19.5" clip-path="url(#cr)" fill="none" stroke="#7a4a20" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Human side: curved smile -->
  <path d="M36 40 Q44 49 52 40" clip-path="url(#cr)" fill="none" stroke="#b03a1a" stroke-width="2" stroke-linecap="round"/>

  <!-- Centre dividing line -->
  <line x1="32" y1="3" x2="32" y2="61" stroke="#c8bfaf" stroke-width="1.2"/>

  <!-- Face outline -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#c8bfaf" stroke-width="1.5"/>
</svg>
